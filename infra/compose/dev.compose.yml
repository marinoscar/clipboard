# =============================================================================
# Docker Compose - Development Overrides
# =============================================================================

services:
  nginx:
    volumes:
      - ../nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro

  api:
    build:
      target: development
    volumes:
      - ../../apps/api/src:/app/src
      - ../../apps/api/prisma:/app/prisma
      - sqlite-data:/data

  web:
    build:
      target: development
    volumes:
      - ../../apps/web/src:/app/src
      - ../../apps/web/index.html:/app/index.html
      - ../../apps/web/vite.config.ts:/app/vite.config.ts

volumes:
  sqlite-data:
